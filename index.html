    <title>AI Subtitle Generator | עיבוד מקומי</title>
    
    <!-- טעינת Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- הגדרות עיצוב מותאמות אישית (Tailwind Config) -->

        tailwind.config = {

                        slate: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155', 800: '#1e293b', 900: '#0f172a', 950: '#020617' }
                    },
                    fontFamily: {
                        sans: ['system-ui', '-apple-system', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],

    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.2.0",
                "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
                "lucide-react": "https://esm.sh/lucide-react@0.263.0"

    <style>
        body {
            background-color: #f8fafc;
            background-image: radial-gradient(at 0% 0%, hsla(238,100%,71%,0.04) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, hsla(286,100%,81%,0.04) 0px, transparent 50%);
            background-attachment: fixed;

        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }

</head>
<body class="text-slate-800 font-sans min-h-screen selection:bg-indigo-200 selection:text-indigo-900">
    
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useRef, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { HardDrive, FileVideo, FileAudio, Download, CheckCircle, AlertCircle, Loader2, Cpu, Lock, Trash2, Bookmark, AlertTriangle, Zap, Sparkles, Settings2, FileText, Activity } from 'lucide-react';

        // ==========================================
        // קוד ה-Web Worker - הורדה מקבילית מואצת
        // ==========================================
        const workerCode = `
            self.Buffer = self.Buffer || { isBuffer: () => false };
            self.global = self.global || self;

            let pipeline, env;
            let transcriber = null;
            let translator = null;
            let currentModelSize = null;
            let currentLoadingStep = 'transcribe_load';
            let deviceType = 'wasm';

            async function chunkedFetch(url, options) {
                if (!url.match(/\\.(onnx|bin|msgpack|safetensors)$/i)) {
                    return fetch(url, options);
                }

                try {
                    const headRes = await fetch(url, { ...options, method: 'HEAD' });
                    if (!headRes.ok) return fetch(url, options);

                    const contentLength = parseInt(headRes.headers.get('content-length'), 10);
                    const acceptRanges = headRes.headers.get('accept-ranges');

                    if (acceptRanges !== 'bytes' || !contentLength || contentLength < 5 * 1024 * 1024) {
                        return fetch(url, options);
                    }

                    const numChunks = 20; 
                    const chunkSize = Math.ceil(contentLength / numChunks);
                    const promises = [];
                    let fileLoaded = 0;

                    for (let i = 0; i < numChunks; i++) {
                        const start = i * chunkSize;
                        const end = i === numChunks - 1 ? contentLength - 1 : (i + 1) * chunkSize - 1;

                        const chunkPromise = fetch(url, {
                            ...options,
                            headers: {
                                ...options.headers,
                                'Range': 'bytes=' + start + '-' + end
                            }
                        }).then(async res => {
                            if (!res.ok && res.status !== 206) throw new Error('Range request failed');
                            
                            const reader = res.body.getReader();
                            const chunks = [];
                            let chunkBytes = 0;

                            while (true) {
                                const { done, value } = await reader.read();
                                if (done) break;
                                chunks.push(value);
                                chunkBytes += value.length;
                                fileLoaded += value.length;
                                
                                self.postMessage({
                                    type: 'progress',
                                    step: currentLoadingStep,
                                    data: { status: 'progress', file: url, loaded: fileLoaded, total: contentLength }
                                });
                            }

                            const assembledChunk = new Uint8Array(chunkBytes);
                            let offset = 0;
                            for (const c of chunks) {
                                assembledChunk.set(c, offset);
                                offset += c.length;
                            }
                            return { index: i, buffer: assembledChunk };
                        });
                        promises.push(chunkPromise);
                    }

                    const assembledChunks = await Promise.all(promises);
                    assembledChunks.sort((a, b) => a.index - b.index);

                    const finalBuffer = new Uint8Array(contentLength);
                    let globalOffset = 0;
                    for (const chunk of assembledChunks) {
                        finalBuffer.set(chunk.buffer, globalOffset);
                        globalOffset += chunk.buffer.byteLength;
                    }

                    return new Response(finalBuffer, {
                        status: 200,
                        headers: new Headers({
                            'Content-Length': contentLength.toString(),
                            'Content-Type': headRes.headers.get('content-type') || 'application/octet-stream'
                        })
                    });

                } catch (e) {
                    console.warn("הורדה מקבילית נכשלה, עובר להורדה רגילה:", e);
                    return fetch(url, options);
                }
            }

            self.onmessage = async (e) => {
                const { type, data } = e.data;

                if (type === 'process') {
                    try {
                        if (!pipeline) {
                            self.postMessage({ type: 'status', text: 'מאתחל מנוע בינה מלאכותית (דור 3 יציב)...' });
                            const transformers = await import('https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0/dist/transformers.min.js');
                            pipeline = transformers.pipeline;
                            env = transformers.env;
                            
                            env.allowLocalModels = false;
                            env.allowRemoteModels = true;
                            env.useBrowserCache = true;
                            
                            if (self.navigator.gpu) {
                                deviceType = 'webgpu';
                                self.postMessage({ type: 'status', text: '🚀 האצת חומרה (WebGPU) הופעלה בהצלחה!' });
                            } else {
                                deviceType = 'wasm';
                                const cores = self.navigator.hardwareConcurrency || 4;
                                env.backends.onnx.wasm.numThreads = Math.min(cores, 8); 
                                env.backends.onnx.wasm.simd = true; 
                                env.backends.onnx.wasm.wasmPaths = 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0/dist/';
                            }
                            
                            env.customFetch = chunkedFetch;
                        }

                        currentLoadingStep = 'transcribe_load';

                        if (!transcriber || currentModelSize !== data.modelSize) {
                            if (transcriber && typeof transcriber.dispose === 'function') {
                                await transcriber.dispose();
                            }
                            currentModelSize = data.modelSize;
                            
                            transcriber = await pipeline('automatic-speech-recognition', data.modelSize, {
                                device: deviceType,
                                progress_callback: (prog) => {
                                    self.postMessage({ type: 'progress', step: 'transcribe_load', data: prog });
                                }
                            });
                        }

                        self.postMessage({ type: 'status', text: 'המודל מוכן! מבצע פענוח קולי ברקע (המסך נשאר פעיל)...' });
                        self.postMessage({ type: 'progress_percent', percent: 40 });

                        const whisperLang = data.mode === 'translate_en_he' ? 'en' : 'he';
                        const output = await transcriber(data.audioData, {
                            language: whisperLang,
                            task: 'transcribe',
                            chunk_length_s: 30,
                            stride_length_s: 5,
                            return_timestamps: true,
                        });

                        if (!output || !output.chunks || output.chunks.length === 0) {
                            throw new Error('לא הצלחנו לזהות דיבור ברור בקובץ.');
                        }

                        if (data.mode === 'translate_en_he') {
                            self.postMessage({ type: 'status', text: 'הפענוח הסתיים! מכין מודל תרגום לעברית...' });
                            self.postMessage({ type: 'progress_percent', percent: 60 });
                            
                            currentLoadingStep = 'translate_load';

                            if (!translator) {
                                translator = await pipeline('translation', 'Xenova/nllb-200-distilled-600M', {
                                    device: 'wasm',
                                    dtype: 'q8',
                                    progress_callback: (prog) => {
                                        self.postMessage({ type: 'progress', step: 'translate_load', data: prog });
                                    }
                                });
                            }

                            self.postMessage({ type: 'status', text: 'מודל תרגום מוכן! מתרגם משפטים ברקע...' });
                            
                            for (let i = 0; i < output.chunks.length; i++) {
                                self.postMessage({ type: 'progress_percent', percent: 80 + Math.round((i / output.chunks.length) * 20) });
                                const translated = await translator(output.chunks[i].text, {
                                    src_lang: 'eng_Latn',
                                    tgt_lang: 'heb_Hebr'
                                });
                                if (translated && translated.length > 0) {
                                    output.chunks[i].text = translated[0].translation_text;
                                }
                            }
                        }

                        self.postMessage({ type: 'complete', chunks: output.chunks });

                    } catch (err) {
                        self.postMessage({ type: 'error', error: err.message });
                    }
                }
            };
        `;

        // ==========================================
        // אפליקציית ה-React הראשית
        // ==========================================
        function App() {
          const SECRET_PIN = "1432"; // 🔒 שנה את המספר הזה לסיסמה הסודית שתרצה
          const [isAuthenticated, setIsAuthenticated] = useState(() => {
              // בדיקה האם הדפדפן הזה כבר אושר בעבר
              return localStorage.getItem('is_my_browser') === 'true';
          });
          const [pinInput, setPinInput] = useState('');
          const [pinError, setPinError] = useState(false);

          const [file, setFile] = useState(null);
          const [status, setStatus] = useState('idle'); 
          const [errorMessage, setErrorMessage] = useState('');
          const [progress, setProgress] = useState(0);
          const [statusText, setStatusText] = useState('');
          const [srtResult, setSrtResult] = useState('');
          const [modelSize, setModelSize] = useState('Xenova/whisper-tiny'); // מודל קל ומהיר כברירת מחדל
          const [mode, setMode] = useState('transcribe_he');
          const [isPersistent, setIsPersistent] = useState(false);
          const [storageUsedMB, setStorageUsedMB] = useState('0.00');
          const [isDragging, setIsDragging] = useState(false);
          const [hasWebGPU, setHasWebGPU] = useState(false);
          
          const fileInputRef = useRef(null);
          const workerRef = useRef(null);
          
          const whisperDownloadsRef = useRef({});
          const nllbDownloadsRef = useRef({});

          useEffect(() => {
            if (navigator.gpu) setHasWebGPU(true);

            const blob = new Blob([workerCode], { type: 'application/javascript' });
            const workerUrl = URL.createObjectURL(blob);
            workerRef.current = new Worker(workerUrl, { type: 'module' });

            workerRef.current.onmessage = (e) => {
                const { type, text, percent, step, data, chunks, error } = e.data;

                if (type === 'status') {
                    setStatusText(text);
                } else if (type === 'progress_percent') {
                    setProgress(percent);
                } else if (type === 'progress') {
                    handleWorkerProgress(step, data);
                } else if (type === 'complete') {
                    const srt = formatSRT(chunks);
                    setSrtResult(srt);
                    setProgress(100);
                    setStatus('complete');
                    calculateStorageUsed(); 
                } else if (type === 'error') {
                    console.error("Worker Error:", error);
                    setStatus('error');
                    setErrorMessage(error || 'אירעה שגיאה בעיבוד נתונים ברקע.');
                }
            };

            async function initStorage() {
              if (navigator.storage && navigator.storage.persist) {
                let persisted = await navigator.storage.persisted();
                if (!persisted) {
                  persisted = await navigator.storage.persist();
                }
                setIsPersistent(persisted);
              }
              calculateStorageUsed();
            }
            initStorage();

            return () => {
                if (workerRef.current) workerRef.current.terminate();
            };
          }, []);

          const handleWorkerProgress = (step, data) => {
              if (step === 'transcribe_load') {
                  const downloads = whisperDownloadsRef.current;
                  if (data.status === 'initiate') downloads[data.file] = { loaded: 0, total: 0 };
                  else if (data.status === 'progress') downloads[data.file] = { loaded: data.loaded || 0, total: data.total || 0 };
                  else if (data.status === 'done' && downloads[data.file]) downloads[data.file].loaded = downloads[data.file].total;
                  
                  updateProgressFromDownloads(downloads, 10, 0.3, "זיהוי קולי");
              } else if (step === 'translate_load') {
                  const downloads = nllbDownloadsRef.current;
                  if (data.status === 'initiate') downloads[data.file] = { loaded: 0, total: 0 };
                  else if (data.status === 'progress') downloads[data.file] = { loaded: data.loaded || 0, total: data.total || 0 };
                  else if (data.status === 'done' && downloads[data.file]) downloads[data.file].loaded = downloads[data.file].total;
                  
                  updateProgressFromDownloads(downloads, 60, 0.2, "תרגום");
              }
          };

          const updateProgressFromDownloads = (downloadsObj, baseProgress, weight, modelName) => {
              let totalLoaded = 0;
              let totalSize = 0;
              Object.values(downloadsObj).forEach(f => {
                  totalLoaded += f.loaded;
                  totalSize += f.total;
              });
              if (totalSize > 0) {
                  const overallProgress = (totalLoaded / totalSize) * 100;
                  setProgress(baseProgress + Math.round(overallProgress * weight));
                  setStatusText(`מוריד/קורא מודל ${modelName}... ${Math.round(overallProgress)}% (מואץ)`);
              }
          };

          const calculateStorageUsed = async () => {
            try {
              let totalBytes = 0;
              if (navigator.storage && navigator.storage.estimate) {
                const estimate = await navigator.storage.estimate();
                if (estimate.usageDetails && estimate.usageDetails.caches) totalBytes = estimate.usageDetails.caches;
                else totalBytes = estimate.usage || 0;
              }
              if (totalBytes === 0 && 'caches' in window) {
                const cacheNames = await caches.keys();
                for (const cacheName of cacheNames) {
                  if (cacheName.includes('transformers')) {
                    const cache = await caches.open(cacheName);
                    const requests = await cache.keys();
                    for (const req of requests) {
                      const res = await cache.match(req);
                      if (res) {
                        const size = res.headers.get('content-length');
                        if (size) totalBytes += parseInt(size, 10);
                        else {
                          const blob = await res.blob();
                          totalBytes += blob.size;
                        }
                      }
                    }
                  }
                }
              }
              setStorageUsedMB((totalBytes / (1024 * 1024)).toFixed(2));
            } catch (err) {
              console.error("שגיאה בחישוב האחסון:", err);
            }
          };

          const clearStorage = async () => {
            if (window.confirm("האם אתה בטוח שברצונך למחוק את כל קובצי הבינה המלאכותית מהמחשב?")) {
              try {
                if ('caches' in window) {
                  const cacheNames = await caches.keys();
                  for (const cacheName of cacheNames) {
                    if (cacheName.includes('transformers')) {
                      await caches.delete(cacheName);
                    }
                  }
                }
                setStorageUsedMB('0.00');
                
                if (workerRef.current) workerRef.current.terminate();
                const blob = new Blob([workerCode], { type: 'application/javascript' });
                workerRef.current = new Worker(URL.createObjectURL(blob), { type: 'module' });
                
                alert('כל קובצי המודלים נמחקו בהצלחה מהכספת והזיכרון פונה!');
              } catch (err) {
                console.error("שגיאה בניקוי האחסון:", err);
                alert('אירעה שגיאה בעת ניקוי האחסון.');
              }
            }
          };

          const handleDragOver = (e) => {
            e.preventDefault();
            e.stopPropagation();
            setIsDragging(true);
          };

          const handleDragLeave = (e) => {
            e.preventDefault();
            e.stopPropagation();
            setIsDragging(false);
          };

          const handleFileSelect = (e) => {
            const selected = e.target.files && e.target.files.length > 0 ? e.target.files[0] : null;
            if (selected) validateAndSetFile(selected);
          };

          const handleDrop = (e) => {
            e.preventDefault(); 
            e.stopPropagation();
            setIsDragging(false);
            if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
              validateAndSetFile(e.dataTransfer.files[0]);
            }
          };

          const validateAndSetFile = (selectedFile) => {
            const maxSizeMB = 2048; // עד 2GB
            if (selectedFile.size > maxSizeMB * 1024 * 1024) {
              setStatus('error');
              setErrorMessage(`הקובץ גדול מדי (${(selectedFile.size / (1024*1024)).toFixed(1)}MB). המערכת תומכת כעת בקבצים כבדים עד 2GB.`);
              return;
            }
            if (selectedFile.type.startsWith('video/') || selectedFile.type.startsWith('audio/') || selectedFile.name.match(/\.(mp4|mkv|avi|mpeg|mpga|m4a|wav|webm|mp3)$/i)) {
              setFile(selectedFile);
              setStatus('idle'); setSrtResult(''); setErrorMessage(''); setProgress(0);
              whisperDownloadsRef.current = {}; nllbDownloadsRef.current = {}; 
            } else {
              setStatus('error');
              setErrorMessage('סוג הקובץ אינו נתמך. אנא העלה וידאו או שמע.');
            }
          };

          const formatTime = (seconds) => {
            if (!seconds || isNaN(seconds)) return "00:00:00,000";
            const date = new Date(seconds * 1000);
            const hh = String(Math.floor(seconds / 3600)).padStart(2, '0');
            const mm = String(date.getUTCMinutes()).padStart(2, '0');
            const ss = String(date.getUTCSeconds()).padStart(2, '0');
            const ms = String(date.getUTCMilliseconds()).padStart(3, '0');
            return `${hh}:${mm}:${ss},${ms}`;
          };

          const formatSRT = (chunks) => {
            return chunks.map((chunk, index) => {
              let startTime = formatTime(chunk.timestamp[0]);
              let endTime = formatTime(chunk.timestamp[1] || chunk.timestamp[0] + 2);
              return `${index + 1}\n${startTime} --> ${endTime}\n${chunk.text.trim()}`;
            }).join('\n\n');
          };

          const processFileLocal = async () => {
            if (!file || !workerRef.current) return;
            
            try {
              setStatus('processing');
              setErrorMessage('');
              setProgress(5);
              
              setStatusText(`קורא את הקובץ (${(file.size / (1024*1024)).toFixed(0)}MB) לזיכרון...`);
              await new Promise(resolve => setTimeout(resolve, 100));

              const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
              let arrayBuffer = await file.arrayBuffer();
              
              setStatusText('מחלץ ומפענח רצועת שמע (בסרטונים כבדים זה עשוי לקחת מעט זמן)...');
              await new Promise(resolve => setTimeout(resolve, 100));
              
              let decodedAudio;
              try {
                  decodedAudio = await audioCtx.decodeAudioData(arrayBuffer);
              } catch (decodeErr) {
                  throw new Error('הקובץ כבד מדי לזיכרון הפנימי של הדפדפן (RAM). נסה לחתוך את הסרטון או להמיר אותו לקובץ שמע (MP3) לפני ההעלאה.');
              }
              
              // פינוי מיידי של הסרטון מהזיכרון החי
              arrayBuffer = null;
              
              let audioData = decodedAudio.getChannelData(0);
              
              if (audioCtx.state !== 'closed') await audioCtx.close();
              
              setProgress(10);
              setStatusText('מעביר את השמע לתהליך רקע חכם (Web Worker)...');

              workerRef.current.postMessage({
                  type: 'process',
                  data: {
                      audioData: audioData,
                      modelSize: modelSize,
                      mode: mode
                  }
              }, [audioData.buffer]);

              decodedAudio = null;
              audioData = null;

            } catch (err) {
              console.error('Error extracting audio:', err);
              setStatus('error');
              setErrorMessage(err.message || 'אירעה שגיאה בחילוץ השמע מהקובץ.');
            }
          };

          const downloadSrt = () => {
            if (!srtResult) return;
            const blob = new Blob([srtResult], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const originalName = file.name.substring(0, file.name.lastIndexOf('.'));
            const suffix = mode === 'translate_en_he' ? '_translated_he' : '_local_he';
            a.download = `${originalName || 'subtitles'}${suffix}.srt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
          };

          const resetApp = () => {
            setFile(null); setStatus('idle'); setSrtResult(''); setErrorMessage(''); setProgress(0);
            calculateStorageUsed();
          };

          // פונקציית התחברות
          const handleLogin = (e) => {
            e.preventDefault();
            if (pinInput === SECRET_PIN) {
                // שמירת חותמת בדפדפן הנוכחי לתמיד
                localStorage.setItem('is_my_browser', 'true');
                setIsAuthenticated(true);
            } else {
                setPinError(true);
                setPinInput('');
            }
          };

          // מסך הנעילה (יוצג אם הדפדפן לא אושר)
          if (!isAuthenticated) {
            return (
              <div dir="rtl" className="min-h-screen bg-slate-900 flex items-center justify-center p-4 sm:p-6">
                  <div className="bg-white rounded-[2rem] p-6 sm:p-8 max-w-sm w-full shadow-2xl text-center relative overflow-hidden mx-auto">
                      <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-indigo-500 to-purple-500"></div>
                      <div className="bg-indigo-50 w-16 h-16 sm:w-20 sm:h-20 rounded-full flex items-center justify-center mx-auto mb-5 sm:mb-6">
                        <Lock className="text-indigo-600 w-8 h-8 sm:w-10 sm:h-10" />
                      </div>
                      <h2 className="text-xl sm:text-2xl font-extrabold text-slate-800 mb-2">אזור פרטי</h2>
                      <p className="text-slate-500 mb-6 sm:mb-8 text-xs sm:text-sm font-medium px-2">הזן את קוד הגישה כדי לאשר דפדפן זה לשימוש קבוע.</p>
                      <form onSubmit={handleLogin}>
                          <input
                              type="password"
                              value={pinInput}
                              onChange={(e) => { setPinInput(e.target.value); setPinError(false); }}
                              className={`w-full text-center text-2xl sm:text-3xl tracking-[0.3em] sm:tracking-[0.5em] p-3 sm:p-4 border-2 ${pinError ? 'border-red-400 bg-red-50 text-red-700' : 'border-slate-200 focus:border-indigo-500 bg-slate-50'} rounded-xl sm:rounded-2xl mb-4 outline-none transition-all`}
                              placeholder="****"
                              autoFocus
                          />
                          {pinError && <p className="text-red-500 text-xs sm:text-sm mb-4 font-bold animate-bounce">קוד שגוי, נסה שוב.</p>}
                          <button type="submit" className="w-full bg-slate-900 hover:bg-indigo-600 text-white font-bold py-3 sm:py-4 rounded-xl sm:rounded-2xl transition-colors shadow-lg mt-2 text-sm sm:text-base">
                              אמת דפדפן והיכנס
                          </button>
                      </form>
                  </div>
              </div>
            );
          }

          return (
            <div dir="rtl" className="min-h-screen pb-8 pt-4 px-3 sm:pb-12 sm:pt-6 sm:px-6 lg:px-8 flex flex-col items-center">
              
              {/* Header area outside card */}
              <div className="w-full max-w-4xl flex flex-col sm:flex-row justify-between items-center sm:items-end gap-4 sm:gap-0 mb-5 sm:mb-6 text-center sm:text-right">
                <div className="flex flex-col gap-1 sm:gap-1.5 items-center sm:items-start">
                  <h1 className="text-2xl sm:text-3xl md:text-4xl font-extrabold text-slate-900 tracking-tight flex items-center gap-2 sm:gap-3">
                    <span className="bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">AI Subtitles</span>
                    <Sparkles className="text-indigo-500 animate-pulse w-6 h-6 sm:w-8 sm:h-8" />
                  </h1>
                  <p className="text-slate-500 font-medium text-xs sm:text-sm md:text-base px-2 sm:px-0">פענוח ותרגום חכם שרץ כולו על המחשב שלך (תומך עד 2GB)</p>
                </div>
                
                {/* Storage Manager Chip */}
                <div className="hidden sm:flex items-center gap-3 bg-white/60 backdrop-blur-md border border-slate-200/60 shadow-sm rounded-full py-1.5 px-4 hover:bg-white transition-colors group">
                  <HardDrive size={16} className="text-indigo-500" />
                  <span className="text-sm font-medium text-slate-600">אחסון מקומי: <span className="font-bold text-slate-800" dir="ltr">{storageUsedMB} MB</span></span>
                  {parseFloat(storageUsedMB) > 0 && (
                    <button 
                      onClick={clearStorage}
                      title="ניקוי מטמון"
                      className="text-slate-400 hover:text-red-500 transition-colors mr-2 p-1 hover:bg-red-50 rounded-full"
                    >
                      <Trash2 size={14} />
                    </button>
                  )}
                </div>
              </div>

              {/* Main Card */}
              <main className="w-full max-w-4xl bg-white/80 backdrop-blur-xl rounded-[2rem] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white/60 overflow-hidden relative">
                
                {/* Decorative Top Gradient */}
                <div className="absolute top-0 inset-x-0 h-2 bg-gradient-to-r from-indigo-500 via-purple-500 to-indigo-500 animate-gradient-x"></div>

                <div className="p-4 sm:p-6 md:p-10">
                  
                  {/* Warnings / Notices */}
                  <div className="grid gap-3 sm:gap-4 mb-6 sm:mb-8">
                    <div className="bg-amber-50/80 border border-amber-200/60 rounded-xl sm:rounded-2xl p-3 sm:p-4 flex flex-col sm:flex-row items-center sm:items-start text-center sm:text-right gap-2 sm:gap-4">
                      <AlertTriangle className="text-amber-600 sm:mt-0.5 shrink-0" size={24} />
                      <div>
                        <h3 className="font-bold text-amber-900 text-sm sm:text-base">כלי בפיתוח (Beta)</h3>
                        <p className="text-amber-800 text-xs sm:text-sm mt-1 leading-relaxed">
                          המערכת מבצעת חישובים כבדים באופן מקומי ועשויה לאמץ מחשבים ישנים. פועל בטכנולוגיית Web Worker למניעת קפיאות ממשק. השימוש באחריותך.
                        </p>
                      </div>
                    </div>
                    
                    {!isPersistent && (
                      <div className="bg-blue-50/80 border border-blue-200/60 rounded-xl sm:rounded-2xl p-3 sm:p-4 flex flex-col sm:flex-row items-center sm:items-start text-center sm:text-right gap-2 sm:gap-4">
                        <Bookmark className="text-blue-600 sm:mt-0.5 shrink-0" size={24} />
                        <div>
                          <h3 className="font-bold text-blue-900 text-sm sm:text-base">טיפ לביצועים:</h3>
                          <p className="text-blue-800 text-xs sm:text-sm mt-1 leading-relaxed">
                            הרץ את הקובץ דרך שרת מקומי (Localhost) כדי לשמור את המודלים בכספת הדפדפן ולחסוך הורדות חוזרות.
                          </p>
                        </div>
                      </div>
                    )}
                  </div>

                  {/* IDLE STATE: File Selection */}
                  {status === 'idle' && !file && (
                    <div 
                      className={`border-2 border-dashed rounded-[1.5rem] sm:rounded-[2rem] p-8 sm:p-12 md:p-16 flex flex-col items-center justify-center text-center cursor-pointer transition-all duration-300 ease-in-out ${
                        isDragging 
                          ? 'border-indigo-500 bg-indigo-50/50 scale-[1.02] shadow-inner' 
                          : 'border-slate-300 hover:border-indigo-400 bg-slate-50/50 hover:bg-slate-50/80'
                      }`}
                      onDragOver={handleDragOver}
                      onDragLeave={handleDragLeave}
                      onDrop={handleDrop}
                      onClick={() => fileInputRef.current?.click()}
                    >
                      <div className={`p-3 sm:p-4 rounded-xl sm:rounded-2xl shadow-sm mb-4 sm:mb-5 transition-transform duration-300 ${isDragging ? 'bg-indigo-100 scale-110' : 'bg-white'}`}>
                        <FileVideo className={`w-10 h-10 sm:w-12 sm:h-12 ${isDragging ? 'text-indigo-600' : 'text-slate-400'}`} />
                      </div>
                      <h3 className="text-lg sm:text-xl md:text-2xl font-bold text-slate-800 mb-1 sm:mb-2">
                        {isDragging ? 'שחרר את הקובץ כאן!' : 'בחר קובץ וידאו או שמע'}
                      </h3>
                      <p className="text-slate-500 font-medium text-xs sm:text-base">או גרור אותו לתוך אזור זה</p>
                      <p className="text-slate-400 text-[10px] sm:text-sm mt-4 px-3 sm:px-4 py-1.5 bg-slate-200/50 rounded-full">עד 2GB (2000MB) • תומך MP4, MP3, WAV ועוד</p>
                      
                      <input 
                        type="file" 
                        ref={fileInputRef} 
                        onChange={handleFileSelect} 
                        className="hidden" 
                        accept="video/*,audio/*"
                      />
                    </div>
                  )}

                  {/* ACTIVE STATE: File Selected / Processing / Complete */}
                  {(file || status !== 'idle') && (
                    <div className="space-y-4 sm:space-y-6">
                      
                      {/* File Card */}
                      <div className="bg-slate-50 border border-slate-200 rounded-xl sm:rounded-2xl p-3 sm:p-6 flex flex-col sm:flex-row items-center gap-3 sm:gap-5 relative overflow-hidden group transition-all">
                        <div className="absolute top-0 left-0 w-1 h-full bg-indigo-500"></div>
                        <div className="bg-white p-2.5 sm:p-3.5 rounded-lg sm:rounded-xl shadow-sm border border-slate-100 text-indigo-600 shrink-0">
                          {file?.type?.startsWith('audio') ? <FileAudio className="w-6 h-6 sm:w-7 sm:h-7" /> : <FileVideo className="w-6 h-6 sm:w-7 sm:h-7" />}
                        </div>
                        <div className="flex-1 text-center sm:text-right w-full min-w-0">
                          <h4 className="font-bold text-slate-800 text-sm sm:text-lg truncate w-full" dir="ltr">{file?.name}</h4>
                          <div className="flex flex-wrap items-center justify-center sm:justify-start gap-2 sm:gap-3 mt-1.5 text-[10px] sm:text-sm text-slate-500">
                            <span className="flex items-center gap-1 font-mono bg-slate-200/60 px-2 py-0.5 rounded-md">
                              {(file?.size / (1024 * 1024)).toFixed(2)} MB
                            </span>
                            <span className="flex items-center gap-1 text-indigo-600 font-medium">
                              <Lock size={12} className="sm:w-[14px] sm:h-[14px]" /> עיבוד מקומי
                            </span>
                          </div>
                          {file?.size > 200 * 1024 * 1024 && (
                            <p className="text-amber-600 text-[10px] sm:text-xs font-medium mt-2 flex items-center justify-center sm:justify-start gap-1">
                              <AlertTriangle size={12} className="shrink-0" />
                              קובץ כבד: החילוץ עשוי לקחת מעט זמן.
                            </p>
                          )}
                        </div>
                        {status === 'idle' && (
                          <button 
                            onClick={resetApp}
                            className="text-xs sm:text-sm font-medium text-slate-600 bg-white border border-slate-200 hover:bg-slate-100 hover:text-slate-900 px-4 py-2 sm:px-5 sm:py-2.5 rounded-lg sm:rounded-xl transition-all shadow-sm w-full sm:w-auto mt-2 sm:mt-0"
                          >
                            החלף קובץ
                          </button>
                        )}
                      </div>

                      {/* Settings Panel */}
                      {status === 'idle' && (
                        <div className="bg-white border border-slate-200 rounded-xl sm:rounded-2xl p-4 sm:p-6 shadow-sm">
                          <h4 className="font-bold text-slate-800 text-sm sm:text-base mb-4 sm:mb-5 flex items-center gap-2">
                            <Settings2 size={18} className="text-indigo-500 shrink-0" />
                            הגדרות עיבוד
                          </h4>
                          
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6">
                            <div className="space-y-1.5 sm:space-y-2">
                              <label className="block text-xs sm:text-sm font-semibold text-slate-700">סוג הפעולה:</label>
                              <div className="relative">
                                <select 
                                  value={mode}
                                  onChange={(e) => setMode(e.target.value)}
                                  className="w-full pl-3 pr-8 sm:pr-10 py-2.5 sm:py-3 border border-slate-300 rounded-lg sm:rounded-xl bg-slate-50 hover:bg-white focus:bg-white focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 outline-none appearance-none font-medium text-xs sm:text-sm md:text-base text-slate-700 transition-colors shadow-sm"
                                >
                                  <option value="transcribe_he">דיבור בעברית ➔ כיתוביות בעברית</option>
                                  <option value="translate_en_he">דיבור באנגלית ➔ תרגום לעברית</option>
                                </select>
                                <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-2 sm:pr-3 text-slate-500">
                                  <svg className="h-4 w-4 sm:h-5 sm:w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7" /></svg>
                                </div>
                              </div>
                            </div>

                            <div className="space-y-1.5 sm:space-y-2">
                              <label className="block text-xs sm:text-sm font-semibold text-slate-700">איכות המודל:</label>
                              <div className="relative">
                                <select 
                                  value={modelSize}
                                  onChange={(e) => setModelSize(e.target.value)}
                                  className="w-full pl-3 pr-8 sm:pr-10 py-2.5 sm:py-3 border border-slate-300 rounded-lg sm:rounded-xl bg-slate-50 hover:bg-white focus:bg-white focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 outline-none appearance-none font-medium text-xs sm:text-sm md:text-base text-slate-700 transition-colors shadow-sm"
                                >
                                  <option value="Xenova/whisper-tiny">בסיסי (Tiny) - סופר מהיר (מומלץ)</option>
                                  <option value="Xenova/whisper-base">רגיל (Base) - איזון בין מהירות לדיוק</option>
                                  <option value="Xenova/whisper-small">מדויק (Small) - כבד יותר</option>
                                </select>
                                <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-2 sm:pr-3 text-slate-500">
                                  <svg className="h-4 w-4 sm:h-5 sm:w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7" /></svg>
                                </div>
                              </div>
                            </div>
                          </div>

                          <div className="mt-4 sm:mt-6 p-3 sm:p-4 bg-indigo-50/50 border border-indigo-100 rounded-lg sm:rounded-xl flex items-start gap-2 sm:gap-3">
                            <Zap className="mt-0.5 shrink-0 text-indigo-500 w-4 h-4 sm:w-5 sm:h-5" />
                            <div className="text-xs sm:text-sm text-indigo-900 leading-relaxed">
                              <strong className="font-bold flex flex-wrap items-center gap-1.5 sm:gap-2 mb-1">
                                מאיץ AI (דור 3 - יציב)
                                {hasWebGPU ? (
                                    <span className="bg-green-100 text-green-700 px-1.5 sm:px-2 py-0.5 rounded text-[10px] sm:text-xs border border-green-200 font-bold shadow-sm">🚀 WebGPU פעיל</span>
                                ) : (
                                    <span className="bg-slate-200 text-slate-600 px-1.5 sm:px-2 py-0.5 rounded text-[10px] sm:text-xs border border-slate-300">⚙️ עיבוד מעבד (CPU)</span>
                                )}
                              </strong>
                              {hasWebGPU 
                                ? 'מצב "האצת חומרה" מופעל! המערכת משתמשת בכרטיס המסך (WebGPU) שלך בגרסה היציבה ביותר, ותתאים את הקידוד אוטומטית לקבלת ביצועים מקסימליים ללא שגיאות.' 
                                : 'המערכת מנצלת את כל ליבות המעבד עם גרסה 3 החדשה. למהירות מקסימלית באמת, פתח בדפדפן חדיש התומך ב-WebGPU.'}
                            </div>
                          </div>
                        </div>
                      )}

                      {/* Action Button */}
                      {status === 'idle' && (
                        <button 
                          onClick={processFileLocal}
                          className="w-full bg-slate-900 hover:bg-indigo-600 text-white font-bold py-3 sm:py-4 px-4 rounded-xl sm:rounded-2xl shadow-[0_4px_14px_0_rgb(0,0,0,0.2)] hover:shadow-[0_6px_20px_rgba(79,70,229,0.3)] hover:-translate-y-0.5 transition-all duration-200 flex justify-center items-center gap-2 sm:gap-3 text-lg sm:text-xl group relative overflow-hidden"
                        >
                          <div className="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]"></div>
                          <Activity className="group-hover:animate-pulse w-5 h-5 sm:w-6 sm:h-6" />
                          התחל פענוח AI
                        </button>
                      )}

                      {/* Processing State */}
                      {status === 'processing' && (
                        <div className="bg-white border border-slate-200 rounded-xl sm:rounded-2xl p-6 sm:p-8 md:p-12 flex flex-col items-center text-center relative overflow-hidden shadow-sm">
                          <div className="absolute inset-0 bg-indigo-50/30"></div>
                          
                          <div className="relative z-10 w-full">
                            <div className="relative mb-6 sm:mb-8 flex justify-center">
                              <div className="absolute inset-0 bg-indigo-400 rounded-full blur-xl opacity-30 animate-pulse"></div>
                              <div className="bg-white p-3 sm:p-4 rounded-full shadow-lg border border-indigo-100 relative">
                                <Loader2 className="animate-spin text-indigo-600 w-8 h-8 sm:w-10 sm:h-10" />
                              </div>
                            </div>
                            
                            <h3 className="text-lg sm:text-2xl font-bold text-slate-800 mb-2 sm:mb-3">{statusText}</h3>
                            <p className="text-slate-500 font-medium text-xs sm:text-sm mb-6 sm:mb-10 max-w-md mx-auto">
                              אל תסגור את הדף. הפעולה מתבצעת באופן מקומי לחלוטין על גבי המעבד שלך.
                            </p>
                            
                            <div className="w-full max-w-lg mx-auto">
                              <div className="flex justify-between text-xs sm:text-sm font-bold text-slate-600 mb-1.5 sm:mb-2 px-1">
                                <span>התקדמות כללית</span>
                                <span dir="ltr">{progress}%</span>
                              </div>
                              <div className="w-full bg-slate-100 rounded-full h-3 sm:h-4 overflow-hidden shadow-inner p-0.5 border border-slate-200/60">
                                <div 
                                  className="h-full rounded-full bg-gradient-to-l from-indigo-500 to-purple-500 relative transition-all duration-300 ease-out" 
                                  style={{ width: `${progress}%` }}
                                >
                                  <div className="absolute inset-0 w-full h-full bg-[linear-gradient(45deg,rgba(255,255,255,0.2)_25%,transparent_25%,transparent_50%,rgba(255,255,255,0.2)_50%,rgba(255,255,255,0.2)_75%,transparent_75%,transparent)] bg-[length:1rem_1rem] animate-[stripes_1s_linear_infinite]"></div>
                                </div>
                              </div>
                            </div>
                          </div>
                        </div>
                      )}

                      {/* Error State */}
                      {status === 'error' && (
                        <div className="animate-fade-in bg-white border border-red-200 rounded-xl sm:rounded-2xl p-6 sm:p-8 flex flex-col items-center gap-3 sm:gap-4 text-center shadow-sm relative overflow-hidden">
                          <div className="absolute top-0 left-0 w-full h-1 bg-red-500"></div>
                          <div className="bg-red-50 p-3 sm:p-4 rounded-full">
                            <AlertCircle className="text-red-500 w-8 h-8 sm:w-10 sm:h-10" />
                          </div>
                          <div>
                            <h4 className="font-bold text-slate-800 text-lg sm:text-xl mb-1 sm:mb-2">אופס, משהו השתבש</h4>
                            <p className="text-slate-600 text-xs sm:text-sm">{errorMessage}</p>
                          </div>
                          <button 
                            onClick={() => setStatus('idle')}
                            className="mt-2 sm:mt-4 bg-white border border-slate-300 text-slate-700 px-6 sm:px-8 py-2 sm:py-2.5 rounded-lg sm:rounded-xl hover:bg-slate-50 hover:text-slate-900 font-bold transition-all shadow-sm text-sm sm:text-base"
                          >
                            נסה שוב
                          </button>
                        </div>
                      )}

                      {/* Complete State */}
                      {status === 'complete' && (
                        <div className="animate-fade-in space-y-4 sm:space-y-6">
                          
                          <div className="bg-gradient-to-r from-emerald-500 to-emerald-600 rounded-xl sm:rounded-2xl p-5 sm:p-8 flex flex-col sm:flex-row items-center sm:items-start text-center sm:text-right gap-4 sm:gap-5 shadow-lg text-white relative overflow-hidden">
                            <div className="absolute -right-4 -top-4 sm:-right-6 sm:-top-6 opacity-10">
                              <CheckCircle className="w-24 h-24 sm:w-[120px] sm:h-[120px]" />
                            </div>
                            <div className="bg-white/20 p-2.5 sm:p-3.5 rounded-xl sm:rounded-2xl backdrop-blur-md border border-white/30 shrink-0 relative z-10">
                              <CheckCircle className="text-white w-6 h-6 sm:w-8 sm:h-8" />
                            </div>
                            <div className="relative z-10">
                              <h4 className="font-bold text-xl sm:text-2xl mb-1 sm:mb-1.5">הכיתוביות מוכנות!</h4>
                              <p className="text-emerald-50 font-medium text-xs sm:text-sm">קובץ הוידאו פוענח בהצלחה על ידי הבינה המלאכותית.</p>
                            </div>
                            <div className="sm:mr-auto shrink-0 relative z-10 pt-2 sm:pt-0 w-full sm:w-auto">
                                <button 
                                  onClick={downloadSrt}
                                  className="w-full sm:w-auto bg-white text-emerald-700 hover:bg-emerald-50 hover:scale-105 font-bold py-2.5 sm:py-3 px-5 sm:px-6 rounded-lg sm:rounded-xl shadow-lg transition-all flex justify-center items-center gap-2 text-sm sm:text-base"
                                >
                                  <Download size={18} className="sm:w-5 sm:h-5" />
                                  שמור קובץ (.srt)
                                </button>
                            </div>
                          </div>

                          <div className="bg-[#0f172a] rounded-xl sm:rounded-2xl overflow-hidden shadow-xl border border-slate-800 relative group">
                            {/* Terminal Header */}
                            <div className="bg-slate-900 px-3 sm:px-4 py-2 sm:py-3 flex items-center justify-between border-b border-slate-800">
                              <div className="flex gap-1.5 sm:gap-2">
                                <div className="w-2.5 h-2.5 sm:w-3 sm:h-3 rounded-full bg-red-500/80"></div>
                                <div className="w-2.5 h-2.5 sm:w-3 sm:h-3 rounded-full bg-yellow-500/80"></div>
                                <div className="w-2.5 h-2.5 sm:w-3 sm:h-3 rounded-full bg-green-500/80"></div>
                              </div>
                              <div className="flex items-center gap-1.5 sm:gap-2 text-slate-400 text-[10px] sm:text-xs font-mono">
                                <FileText size={12} className="sm:w-[14px] sm:h-[14px]" />
                                output.srt
                              </div>
                            </div>
                            {/* Terminal Content */}
                            <div className="p-3 sm:p-5">
                                <pre className="text-slate-300 text-[10px] sm:text-sm font-mono whitespace-pre-wrap overflow-y-auto max-h-48 sm:max-h-64 custom-scrollbar selection:bg-slate-700 selection:text-white leading-relaxed" dir="ltr">
                                  {srtResult}
                                </pre>
                            </div>
                          </div>

                          <div className="flex justify-center pt-1 sm:pt-2">
                            <button 
                              onClick={resetApp}
                              className="bg-white border border-slate-200 hover:border-slate-300 hover:bg-slate-50 text-slate-600 font-bold py-2.5 sm:py-3 px-6 sm:px-8 rounded-lg sm:rounded-xl transition-all shadow-sm w-full sm:w-auto text-sm sm:text-base"
                            >
                              עבד קובץ נוסף
                            </button>
                          </div>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              </main>
              
              {/* Mobile Storage Manager (Visible only on small screens) */}
              <div className="mt-6 sm:hidden flex items-center justify-center gap-2 bg-white/80 backdrop-blur-md border border-slate-200 shadow-sm rounded-full py-2 px-4">
                <HardDrive size={14} className="text-indigo-500" />
                <span className="text-xs font-medium text-slate-600">מטמון: <span className="font-bold text-slate-800" dir="ltr">{storageUsedMB} MB</span></span>
                {parseFloat(storageUsedMB) > 0 && (
                  <button 
                    onClick={clearStorage}
                    className="text-slate-400 hover:text-red-500 ml-1.5 p-1 hover:bg-red-50 rounded-full"
                  >
                    <Trash2 size={14} />
                  </button>
                )}
              </div>

            </div>
          );
        }

        // --- Custom Animations ---
        const style = document.createElement('style');
        style.innerHTML = `
          @keyframes shimmer {
            100% { transform: translateX(100%); }
          }
          @keyframes stripes {
            from { background-position: 1rem 0; }
            to { background-position: 0 0; }
          }
          .animate-fade-in {
            animation: fadeIn 0.4s ease-out;
          }
          @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
          }
        `;
        document.head.appendChild(style);

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
