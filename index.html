<body class="text-slate-800 font-sans min-h-screen selection:bg-indigo-200 selection:text-indigo-900">
    
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useRef, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { HardDrive, FileVideo, FileAudio, Download, CheckCircle, AlertCircle, Loader2, Cpu, Lock, Trash2, Bookmark, AlertTriangle, Zap, Sparkles, Settings2, FileText, Activity, LogOut, Users, Mail, Copy, Check, AlignLeft, CheckSquare, List, Key, Settings, Moon, Sun, Globe, Wand2, Type, FileJson } from 'lucide-react';

        import { initializeApp } from 'firebase/app';
        import { getAuth, onAuthStateChanged, signInWithCustomToken, signInAnonymously } from 'firebase/auth';
        import { getFirestore, doc, setDoc, getDocs, collection, query } from 'firebase/firestore';

        // Initialize Firebase
        let app, auth, db, appId;
        let isFirebaseDummy = false;
        try {
            const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
                apiKey: "", authDomain: "dummy.firebaseapp.com", projectId: "dummy", storageBucket: "dummy.appspot.com", messagingSenderId: "1", appId: "1"
            };
            
            // Check if we are in a dummy/preview environment to prevent network errors
            if (!firebaseConfig.apiKey || firebaseConfig.projectId === "dummy") {
                isFirebaseDummy = true;
            } else {
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
            }
            appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        } catch(e) { 
            console.error("Firebase init error:", e); 
            isFirebaseDummy = true;
        }

        // ==========================================
        // קוד ה-Web Worker - הורדה מקומית יציבה
        // ==========================================
        const workerCode = `
            self.Buffer = self.Buffer || { isBuffer: () => false };
            self.global = self.global || self;

            let pipeline, env;
            let transcriber = null;
            let translator = null;
            let currentModelSize = null;
            let currentLoadingStep = 'transcribe_load';

            // --- טיפול בשגיאות מערכת קריטיות בתוך תהליך הרקע ---
            self.onerror = function(e) {
                self.postMessage({ type: 'error', error: 'קריסת מערכת (חריגת זיכרון או שגיאת דפדפן): ' + e.message });
            };
            self.onunhandledrejection = function(e) {
                self.postMessage({ type: 'error', error: 'פעולת רקע נכשלה: ' + (e.reason && e.reason.message ? e.reason.message : 'שגיאה לא ידועה') });
            };

            // מנגנון ניסיונות חוזרים למניעת קריסות רשת (Exponential Backoff)
            async function fetchWithRetry(url, options, retries = 3) {
                for (let i = 0; i < retries; i++) {
                    try {
                        const res = await fetch(url, options);
                        if (res.ok || res.status === 206) return res;
                        if (i === retries - 1) throw new Error('Status: ' + res.status);
                    } catch (err) {
                        if (i === retries - 1) throw err;
                        await new Promise(r => setTimeout(r, 1500 * (i + 1))); 
                    }
                }
            }

            async function chunkedFetch(url, options) {
                if (!url.match(/\\.(onnx|bin|msgpack|safetensors)$/i)) {
                    return fetchWithRetry(url, options);
                }

                try {
                    const headRes = await fetchWithRetry(url, { ...options, method: 'HEAD' });
                    const contentLength = parseInt(headRes.headers.get('content-length'), 10);
                    const acceptRanges = headRes.headers.get('accept-ranges');

                    if (acceptRanges !== 'bytes' || !contentLength || contentLength < 5 * 1024 * 1024) {
                        return fetchWithRetry(url, options);
                    }

                    // פיצול ההורדה בהתאם להגדרות המשתמש או ברירת מחדל
                    const numChunks = self.customNumChunks || 16; 
                    const chunkSize = Math.ceil(contentLength / numChunks);
                    const promises = [];
                    let fileLoaded = 0;

                    for (let i = 0; i < numChunks; i++) {
                        const start = i * chunkSize;
                        const end = i === numChunks - 1 ? contentLength - 1 : (i + 1) * chunkSize - 1;

                        const chunkPromise = fetchWithRetry(url, {
                            ...options,
                            headers: {
                                ...options.headers,
                                'Range': 'bytes=' + start + '-' + end
                            }
                        }).then(async res => {
                            const reader = res.body.getReader();
                            const chunks = [];
                            let chunkBytes = 0;

                            while (true) {
                                const { done, value } = await reader.read();
                                if (done) break;
                                chunks.push(value);
                                chunkBytes += value.length;
                                fileLoaded += value.length;
                                
                                self.postMessage({
                                    type: 'progress',
                                    step: currentLoadingStep,
                                    data: { status: 'progress', file: url, loaded: fileLoaded, total: contentLength }
                                });
                            }

                            const assembledChunk = new Uint8Array(chunkBytes);
                            let offset = 0;
                            for (const c of chunks) {
                                assembledChunk.set(c, offset);
                                offset += c.length;
                            }
                            return { index: i, buffer: assembledChunk };
                        });
                        promises.push(chunkPromise);
                    }

                    const assembledChunks = await Promise.all(promises);
                    assembledChunks.sort((a, b) => a.index - b.index);

                    const finalBuffer = new Uint8Array(contentLength);
                    let globalOffset = 0;
                    for (const chunk of assembledChunks) {
                        finalBuffer.set(chunk.buffer, globalOffset);
                        globalOffset += chunk.buffer.byteLength;
                    }

                    return new Response(finalBuffer, {
                        status: 200,
                        headers: new Headers({
                            'Content-Length': contentLength.toString(),
                            'Content-Type': headRes.headers.get('content-type') || 'application/octet-stream'
                        })
                    });

                } catch (e) {
                    console.warn("הורדה מקבילית נכשלה, עובר להורדה רגילה עמידה:", e);
                    return fetchWithRetry(url, options);
                }
            }

            self.onmessage = async (e) => {
                const { type, data } = e.data;

                if (type === 'process') {
                    self.customNumChunks = data.numChunks || 16;
                    try {
                        if (!pipeline) {
                            self.postMessage({ type: 'status', text: 'מאתחל מנוע בינה מלאכותית ברקע...' });
                            
                            let transformers;
                            try {
                                transformers = await import('https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1/dist/transformers.min.js');
                            } catch (importErr) {
                                throw new Error('שגיאה בטעינת ספריות ליבה. ייתכן ויש חסימת רשת.');
                            }

                            pipeline = transformers.pipeline;
                            env = transformers.env;
                            
                            env.allowLocalModels = false;
                            env.allowRemoteModels = true;
                            env.useBrowserCache = true;
                            
                            const cores = self.navigator.hardwareConcurrency || 4;
                            env.backends.onnx.wasm.numThreads = Math.min(cores, 8); 
                            env.backends.onnx.wasm.simd = true; 
                            
                            env.backends.onnx.wasm.wasmPaths = 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1/dist/';
                            
                            env.customFetch = chunkedFetch;
                        }

                        currentLoadingStep = 'transcribe_load';

                        if (!transcriber || currentModelSize !== data.modelSize) {
                            if (transcriber && typeof transcriber.dispose === 'function') {
                                await transcriber.dispose();
                            }
                            currentModelSize = data.modelSize;
                            
                            try {
                                transcriber = await pipeline('automatic-speech-recognition', data.modelSize, {
                                    quantized: true,
                                    progress_callback: (prog) => {
                                        self.postMessage({ type: 'progress', step: 'transcribe_load', data: prog });
                                    }
                                });
                            } catch (err) {
                                throw new Error('שגיאה בהורדת מודל הדיבור. נסה לנקות את המטמון ולוודא חיבור אינטרנט יציב.');
                            }
                        }

                        self.postMessage({ type: 'status', text: 'המודל מוכן! מבצע פענוח קולי ברקע (המסך נשאר פעיל)...' });
                        self.postMessage({ type: 'progress_percent', percent: 40 });

                        let whisperLang = 'he';
                        if (data.mode === 'transcribe_en' || data.mode === 'translate_en_he') {
                            whisperLang = 'en';
                        }

                        const output = await transcriber(data.audioData, {
                            language: whisperLang,
                            task: 'transcribe',
                            chunk_length_s: 30,
                            stride_length_s: 5,
                            return_timestamps: true,
                        });

                        if (!output || !output.chunks || output.chunks.length === 0) {
                            throw new Error('לא הצלחנו לזהות דיבור ברור בקובץ.');
                        }

                        const needsTranslation = data.mode.startsWith('translate_');

                        if (needsTranslation) {
                            self.postMessage({ type: 'status', text: 'הפענוח הסתיים! מכין מודל תרגום...' });
                            self.postMessage({ type: 'progress_percent', percent: 60 });
                            
                            if (!translator) {
                                try {
                                    translator = await pipeline('translation', 'Xenova/nllb-200-distilled-600M', {
                                        quantized: true,
                                        progress_callback: (prog) => {
                                            self.postMessage({ type: 'progress', step: 'translate_load', data: prog });
                                        }
                                    });
                                } catch (err) {
                                    throw new Error('שגיאה בהורדת מודל התרגום.');
                                }
                            }

                            self.postMessage({ type: 'status', text: 'מודל תרגום מוכן! מתרגם משפטים ברקע...' });
                            
                            const src_lang = data.mode === 'translate_en_he' ? 'eng_Latn' : 'heb_Hebr';
                            const tgt_lang = data.mode === 'translate_en_he' ? 'heb_Hebr' : 'eng_Latn';

                            for (let i = 0; i < output.chunks.length; i++) {
                                self.postMessage({ type: 'progress_percent', percent: 80 + Math.round((i / output.chunks.length) * 20) });
                                const translated = await translator(output.chunks[i].text, {
                                    src_lang: src_lang,
                                    tgt_lang: tgt_lang
                                });
                                if (translated && translated.length > 0) {
                                    output.chunks[i].text = translated[0].translation_text;
                                }
                            }
                        }

                        self.postMessage({ type: 'complete', chunks: output.chunks });

                    } catch (err) {
                        self.postMessage({ type: 'error', error: err.message });
                    }
                }
            };
        `;

        // ==========================================
        // אפליקציית ה-React הראשית
        // ==========================================
        function App() {
          const [user, setUser] = useState(null);
          const [isAuthLoading, setIsAuthLoading] = useState(true);
          const [adminStats, setAdminStats] = useState({ total: 0, currentMonth: 0 });

          const [file, setFile] = useState(null);
          const [status, setStatus] = useState('idle'); 
          const [errorMessage, setErrorMessage] = useState('');
          const [progress, setProgress] = useState(0);
          const [statusText, setStatusText] = useState('');
          const [srtResult, setSrtResult] = useState('');
          const [modelSize, setModelSize] = useState('Xenova/whisper-base');
          const [mode, setMode] = useState('transcribe_he');
          const [isPersistent, setIsPersistent] = useState(false);
          const [storageUsedMB, setStorageUsedMB] = useState('0.00');
          const [isDragging, setIsDragging] = useState(false);
          const [copied, setCopied] = useState(false);
          
          // Gemini API States
          const [llmResult, setLlmResult] = useState('');
          const [isLlmLoading, setIsLlmLoading] = useState(false);
          const [llmError, setLlmError] = useState('');
          const [activeLlmAction, setActiveLlmAction] = useState(null);
          const [geminiApiKey, setGeminiApiKey] = useState('');
          const [showApiKeyModal, setShowApiKeyModal] = useState(false);
          const [tempApiKey, setTempApiKey] = useState('');
          const [pendingAction, setPendingAction] = useState(null);
          
          // Theme & Additional Settings States
          const [theme, setTheme] = useState(() => localStorage.getItem('theme') || 'light');
          const [numChunks, setNumChunks] = useState(() => parseInt(localStorage.getItem('numChunks')) || 16);
          const [exportFormat, setExportFormat] = useState(() => localStorage.getItem('exportFormat') || 'srt');
          const [editorFontSize, setEditorFontSize] = useState(() => localStorage.getItem('editorFontSize') || '15px');
          
          const [showSettingsModal, setShowSettingsModal] = useState(false);
          const [workerSession, setWorkerSession] = useState(0);
          const processingSessionRef = useRef(0); // רפרנס למניעת התנגשויות של תהליכים ישנים
          const [uiLang, setUiLang] = useState(() => localStorage.getItem('uiLang') || 'he');
          
          const fileInputRef = useRef(null);
          const workerRef = useRef(null);
          
          const whisperDownloadsRef = useRef({});
          const nllbDownloadsRef = useRef({});

          // --- Initialization & LocalStorage Saves ---
          useEffect(() => {
              const savedKey = localStorage.getItem('gemini_api_key');
              if (savedKey) setGeminiApiKey(savedKey);
              
              if (theme === 'dark') document.documentElement.classList.add('dark');
              else document.documentElement.classList.remove('dark');
          }, [theme]);
          
          useEffect(() => localStorage.setItem('numChunks', numChunks.toString()), [numChunks]);
          useEffect(() => localStorage.setItem('exportFormat', exportFormat), [exportFormat]);
          useEffect(() => localStorage.setItem('editorFontSize', editorFontSize), [editorFontSize]);
          
          useEffect(() => {
              localStorage.setItem('uiLang', uiLang);
              document.documentElement.dir = uiLang === 'he' ? 'rtl' : 'ltr';
              document.documentElement.lang = uiLang;
          }, [uiLang]);

          // --- Firebase Auth & Setup (Transparent Authentication with Fallback) ---
          useEffect(() => {
              const initCanvasAuth = async () => {
                  if (isFirebaseDummy) {
                      // Bypass auth entirely if dummy environment to prevent console errors
                      setUser({ uid: 'local-user', displayName: 'משתמש מקומי', email: 'local@example.com' });
                      setIsAuthLoading(false);
                      return;
                  }

                  if (!auth) {
                      setIsAuthLoading(false);
                      return;
                  }
                  
                  try {
                      if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                          await signInWithCustomToken(auth, __initial_auth_token);
                      } else {
                          await signInAnonymously(auth);
                      }
                  } catch (e) {
                      console.warn("Auth init bypassed:", e);
                      setUser({ uid: 'local-user', displayName: 'משתמש מקומי', email: 'local@example.com' });
                      setIsAuthLoading(false);
                  }
              };
              
              initCanvasAuth();

              if (!isFirebaseDummy && auth) {
                  const unsubscribe = onAuthStateChanged(auth, async (currUser) => {
                      if (!currUser) return;
                      setUser(currUser);
                      setIsAuthLoading(false);
                      
                      try {
                          const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'logins', currUser.uid);
                          await setDoc(userRef, {
                              email: currUser.email || 'Anonymous',
                              name: currUser.displayName || 'Anonymous',
                              lastLogin: new Date().toISOString(),
                              month: new Date().getMonth() + 1,
                              year: new Date().getFullYear()
                          }, { merge: true });
                      } catch (e) {
                          // Silently fail if firestore is restricted
                      }
                  });
                  return () => unsubscribe();
              }
          }, []);

          // Fetch admin stats
          useEffect(() => {
              if (!isFirebaseDummy && user && user.email === 'hyywry013@gmail.com') {
                  const fetchAdminStats = async () => {
                      try {
                          const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'logins'));
                          const snapshot = await getDocs(q);
                          const currentMonth = new Date().getMonth() + 1;
                          const currentYear = new Date().getFullYear();
                          
                          let total = 0;
                          let monthCount = 0;
                          
                          snapshot.forEach(doc => {
                              total++;
                              const data = doc.data();
                              if (data.month === currentMonth && data.year === currentYear) {
                                  monthCount++;
                              }
                          });
                          
                          setAdminStats({ total, currentMonth: monthCount });
                      } catch (e) {
                          // Silently fail
                      }
                  };
                  fetchAdminStats();
              }
          }, [user]);

          const sendEmailReport = () => {
              const subject = encodeURIComponent("דוח כניסות חודשי - אתר מחולל הכתוביות");
              const body = encodeURIComponent(`שלום,\n\nהנה הנתונים לחודש הנוכחי:\nסך הכל משתמשים ייחודיים החודש: ${adminStats.currentMonth}\nסך הכל משתמשים אי פעם: ${adminStats.total}\n\nבברכה,\nמערכת האתר`);
              window.location.href = `mailto:hyywry013@gmail.com?subject=${subject}&body=${body}`;
          };

          // --- ניהול מחזור החיים של ה-Worker למניעת דליפות זיכרון ---
          useEffect(() => {
            const blob = new Blob([workerCode], { type: 'application/javascript' });
            const workerUrl = URL.createObjectURL(blob);
            workerRef.current = new Worker(workerUrl, { type: 'module' });

            workerRef.current.onmessage = (e) => {
                const { type, text, percent, step, data, chunks, error } = e.data;
                if (type === 'status') setStatusText(text);
                else if (type === 'progress_percent') setProgress(percent);
                else if (type === 'progress') handleWorkerProgress(step, data);
                else if (type === 'complete') {
                    const srt = formatSRT(chunks);
                    setSrtResult(srt);
                    setProgress(100);
                    setStatus('complete');
                    calculateStorageUsed(); 
                } else if (type === 'error') {
                    console.error("Worker Error:", error);
                    setStatus('error');
                    setErrorMessage(error || 'אירעה שגיאה בעיבוד נתונים ברקע.');
                }
            };

            async function initStorage() {
              if (navigator.storage && navigator.storage.persist) {
                let persisted = await navigator.storage.persisted();
                if (!persisted) persisted = await navigator.storage.persist();
                setIsPersistent(persisted);
              }
              calculateStorageUsed();
            }
            initStorage();

            return () => {
                if (workerRef.current) {
                    workerRef.current.terminate();
                }
                URL.revokeObjectURL(workerUrl);
            };
          }, [workerSession]);

          const handleWorkerProgress = (step, data) => {
              if (step === 'transcribe_load') {
                  const downloads = whisperDownloadsRef.current;
                  if (data.status === 'initiate') downloads[data.file] = { loaded: 0, total: 0 };
                  else if (data.status === 'progress') downloads[data.file] = { loaded: data.loaded || 0, total: data.total || 0 };
                  else if (data.status === 'done' && downloads[data.file]) downloads[data.file].loaded = downloads[data.file].total;
                  updateProgressFromDownloads(downloads, 10, 0.3, "זיהוי קולי");
              } else if (step === 'translate_load') {
                  const downloads = nllbDownloadsRef.current;
                  if (data.status === 'initiate') downloads[data.file] = { loaded: 0, total: 0 };
                  else if (data.status === 'progress') downloads[data.file] = { loaded: data.loaded || 0, total: data.total || 0 };
                  else if (data.status === 'done' && downloads[data.file]) downloads[data.file].loaded = downloads[data.file].total;
                  updateProgressFromDownloads(downloads, 60, 0.2, "תרגום");
              }
          };

          const updateProgressFromDownloads = (downloadsObj, baseProgress, weight, modelName) => {
              let totalLoaded = 0;
              let totalSize = 0;
              Object.values(downloadsObj).forEach(f => {
                  totalLoaded += f.loaded;
                  totalSize += f.total;
              });
              if (totalSize > 0) {
                  const overallProgress = (totalLoaded / totalSize) * 100;
                  setProgress(baseProgress + Math.round(overallProgress * weight));
                  setStatusText(`מוריד/קורא מודל ${modelName}... ${Math.round(overallProgress)}% (מואץ)`);
              }
          };

          const calculateStorageUsed = async () => {
            try {
              let totalBytes = 0;
              if (navigator.storage && navigator.storage.estimate) {
                const estimate = await navigator.storage.estimate();
                if (estimate.usageDetails && estimate.usageDetails.caches) totalBytes = estimate.usageDetails.caches;
                else totalBytes = estimate.usage || 0;
              }
              setStorageUsedMB((totalBytes / (1024 * 1024)).toFixed(2));
            } catch (err) {}
          };

          const clearStorage = async () => {
            if (window.confirm("האם אתה בטוח שברצונך למחוק את כל קובצי הבינה המלאכותית מהמחשב?")) {
              try {
                if ('caches' in window) {
                  const cacheNames = await caches.keys();
                  for (const cacheName of cacheNames) {
                    if (cacheName.includes('transformers')) await caches.delete(cacheName);
                  }
                }
                setStorageUsedMB('0.00');
                
                // Reset worker safely
                processingSessionRef.current += 1;
                setWorkerSession(prev => prev + 1);
                
                alert('כל קובצי המודלים נמחקו בהצלחה מהכספת והזיכרון פונה!');
              } catch (err) { alert('אירעה שגיאה בעת ניקוי האחסון.'); }
            }
          };

          const handleDragOver = (e) => {
            e.preventDefault();

          };

          const handleDrop = (e) => {
            e.preventDefault();

            if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {

          };

          const validateAndSetFile = (selectedFile) => {
            const maxSizeMB = 2048; 
            if (selectedFile.size > maxSizeMB * 1024 * 1024) {
              setStatus('error');
              setErrorMessage(`הקובץ גדול מדי (${(selectedFile.size / (1024*1024)).toFixed(1)}MB). המערכת תומכת כעת בקבצים כבדים עד 2GB.`);
              return;
            }
            if (selectedFile.type.startsWith('video/') || selectedFile.type.startsWith('audio/') || selectedFile.name.match(/\.(mp4|mkv|avi|mpeg|mpga|m4a|wav|webm|mp3)$/i)) {
              setFile(selectedFile);
              setStatus('idle'); setSrtResult(''); setErrorMessage(''); setProgress(0); setCopied(false);
              whisperDownloadsRef.current = {}; nllbDownloadsRef.current = {}; 
            } else {
              setStatus('error');
              setErrorMessage('סוג הקובץ אינו נתמך. אנא העלה וידאו או שמע.');
            }
          };

          const formatTime = (seconds) => {
            if (!seconds || isNaN(seconds)) return "00:00:00,000";
            const date = new Date(seconds * 1000);
            const hh = String(Math.floor(seconds / 3600)).padStart(2, '0');
            const mm = String(date.getUTCMinutes()).padStart(2, '0');
            const ss = String(date.getUTCSeconds()).padStart(2, '0');
            const ms = String(date.getUTCMilliseconds()).padStart(3, '0');
            return `${hh}:${mm}:${ss},${ms}`;
          };

          const formatSRT = (chunks) => {
            return chunks.map((chunk, index) => {
              let startTime = formatTime(chunk.timestamp[0]);
              let endTime = formatTime(chunk.timestamp[1] || chunk.timestamp[0] + 2);
              return `${index + 1}\n${startTime} --> ${endTime}\n${chunk.text.trim()}`;
            }).join('\n\n');
          };

          const processFileLocal = async () => {
            if (!file || !workerRef.current || status === 'processing') return;
            
            const currentSession = processingSessionRef.current;
            let audioCtx = null;
            
            // אזהרת זיכרון לקבצים עצומים למניעת קריסת הדפדפן
            if (file.size > 500 * 1024 * 1024) {
                if (!window.confirm('הקובץ שבחרת גדול מאוד (מעל 500MB). פענוח הקובץ דורש כמות זיכרון (RAM) גדולה מאוד מהמחשב שלך ועלול לגרום לדפדפן לקרוס. האם ברצונך להמשיך בכל זאת? מומלץ לחתוך או להמיר ל-MP3.')) {
                    return;
                }
            }
            
            try {
              setStatus('processing');
              setErrorMessage('');
              setProgress(5);
              setStatusText(`קורא את הקובץ (${(file.size / (1024*1024)).toFixed(0)}MB) לזיכרון...`);
              
              await new Promise(resolve => setTimeout(resolve, 150));
              if (currentSession !== processingSessionRef.current) return;
              
              let arrayBuffer;
              try {
                  arrayBuffer = await file.arrayBuffer();
              } catch (bufferErr) {
                  throw new Error('קריאת הקובץ נכשלה. ייתכן שהקובץ כבד מדי לזיכרון ה-RAM הפנוי במחשב שלך.');
              }
              
              if (currentSession !== processingSessionRef.current) return;
              
              audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
              
              setStatusText('מחלץ ומפענח רצועת שמע (בסרטונים כבדים זה עשוי לקחת מספר דקות)...');
              setProgress(8);
              await new Promise(resolve => setTimeout(resolve, 100));
              
              let decodedAudio;
              try {
                  decodedAudio = await audioCtx.decodeAudioData(arrayBuffer);
              } catch (decodeErr) {
                  console.error("Audio Decode Error:", decodeErr);
                  throw new Error('הדפדפן כשל בפענוח הקובץ. זיכרון ה-RAM במחשב לא הספיק לעיבוד גודל כזה של שמע. אנא המר את הקובץ לפורמט שמע מכווץ (כמו MP3) ונסה שוב.');
              }
              
              arrayBuffer = null;
              if (currentSession !== processingSessionRef.current) return;
              
              let audioData = decodedAudio.getChannelData(0);
              
              if (audioCtx.state !== 'closed') await audioCtx.close();
              audioCtx = null;
              
              setProgress(12);
              setStatusText('מעביר נתונים למנוע הבינה המלאכותית (Web Worker)...');

              workerRef.current.postMessage({
                  type: 'process',
                  data: { audioData, modelSize, mode, numChunks }
              }, [audioData.buffer]);
              
              decodedAudio = null;
              audioData = null;

            } catch (err) {
              if (currentSession === processingSessionRef.current) {
                  setStatus('error');
                  setErrorMessage(err.message || 'אירעה שגיאה בלתי צפויה בחילוץ השמע מהקובץ.');
              }
            } finally {
              // הגנה מושלמת לשחרור זיכרון ה-Audio Context גם במקרה של קריסה
              if (audioCtx && audioCtx.state !== 'closed') {
                  try { await audioCtx.close(); } catch(e){}
              }
            }
          };

                        .replace(/\n{2,}/g, '\n')

              const payload = {
                  contents: [{ parts: [{ text: `${promptContext}\n\n${cleanText}` }] }],
                  systemInstruction: { parts: [{ text: "אתה עוזר בינה מלאכותית. ענה רק בעברית ושמור על שפה נקייה ומכבדת." }] }
              };

              let retries = 5;
              let delay = 1000;
              let success = false;

              while (retries > 0 && !success) {
                  try {
                      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKeyToUse}`, {
                          method: 'POST',
                          headers: { 'Content-Type': 'application/json' },
                          body: JSON.stringify(payload)
                      });
                      
                      if (!response.ok) {
                          if (response.status === 400 || response.status === 403) {
                              throw new Error('מפתח API לא תקין או שאין הרשאות. אנא בדוק את המפתח שהזנת.');
                          }
                          throw new Error(`HTTP error! status: ${response.status}`);
                      }
                      
                      let result;
                      try {
                          result = await response.json();
                      } catch (jsonErr) {
                          throw new Error('שגיאת שרת: לא התקבל מידע תקין משרתי Gemini. ייתכן שיש עומס.');
                      }
                      
                      const generatedText = result.candidates?.[0]?.content?.parts?.[0]?.text;
                      
                      if (generatedText) {

                          success = true;
                      } else {
                          throw new Error('לא התקבל טקסט תקין מהמודל.');
                      }

                          delay *= 2;
                      }
                  }
              }

          };

                        className="flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold transition-colors border bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 border-slate-200 dark:border-slate-600"
                    >
                        <Globe size={14} /> {uiLang === 'he' ? 'EN' : 'HE'}
                    </button>
                    <button 
                        onClick={() => setShowSettingsModal(true)} 
                        className="flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold transition-colors border bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 border-slate-200 dark:border-slate-600"
                    >
                        <Settings size={14} /> {t.settings}
                    </button>
                    <button 
                        onClick={() => setShowApiKeyModal(true)} 
                        className={`flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold transition-colors border ${geminiApiKey ? 'bg-emerald-50 text-emerald-700 border-emerald-200 dark:bg-emerald-900/30 dark:text-emerald-300 dark:border-emerald-800' : 'bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 border-slate-200 dark:border-slate-600'}`}
                    >
                        <Key size={14} />
                        {geminiApiKey ? t.apiConnected : t.setApi}
                    </button>
                 </div>
              </div>
              
              {/* Settings Modal */}
              {showSettingsModal && (
                  <div className="fixed inset-0 z-[150] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm transition-all duration-300 p-4">
                      <div className="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl max-w-md w-full p-6 animate-fade-in border border-slate-200 dark:border-slate-800 max-h-[90vh] overflow-y-auto custom-scrollbar">
                          <h3 className="text-xl font-bold text-slate-800 dark:text-white mb-6 flex items-center gap-2 border-b border-slate-100 dark:border-slate-800 pb-3">
                              <Settings className="text-indigo-500" size={20} />
                              {t.settingsTitle}
                          </h3>
                          
                          <div className="space-y-6 mb-8">
                              {/* Theme Toggle */}
                              <div>
                                  <label className="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-3">{t.theme}</label>
                                  <div className="flex gap-3">
                                      <button 
                                          onClick={() => setTheme('light')}
                                          className={`flex-1 py-2 px-4 rounded-xl flex items-center justify-center gap-2 border-2 font-bold transition-all ${theme === 'light' ? 'bg-indigo-50 border-indigo-200 text-indigo-700 dark:bg-indigo-900/30 dark:border-indigo-500/50 dark:text-indigo-300' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50 dark:bg-slate-800 dark:border-slate-700 dark:text-slate-400 dark:hover:bg-slate-700'}`}
                                      >
                                          <Sun size={18} /> {t.light}
                                      </button>
                                      <button 
                                          onClick={() => setTheme('dark')}
                                          className={`flex-1 py-2 px-4 rounded-xl flex items-center justify-center gap-2 border-2 font-bold transition-all ${theme === 'dark' ? 'bg-indigo-50 border-indigo-200 text-indigo-700 dark:bg-indigo-900/30 dark:border-indigo-500/50 dark:text-indigo-300' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50 dark:bg-slate-800 dark:border-slate-700 dark:text-slate-400 dark:hover:bg-slate-700'}`}
                                      >
                                          <Moon size={18} /> {t.dark}
                                      </button>
                                  </div>
                              </div>

                              {/* Export Format */}
                              <div>
                                  <label className="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-3">{t.exportFormatLabel}</label>
                                  <div className="flex gap-3">
                                      {['srt', 'vtt', 'txt'].map(fmt => (
                                          <button
                                              key={fmt}
                                              onClick={() => setExportFormat(fmt)}
                                              className={`flex-1 py-2 px-3 rounded-xl font-bold transition-all border-2 ${exportFormat === fmt ? 'bg-indigo-50 border-indigo-200 text-indigo-700 dark:bg-indigo-900/30 dark:border-indigo-500/50 dark:text-indigo-300' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50 dark:bg-slate-800 dark:border-slate-700 dark:text-slate-400 dark:hover:bg-slate-700'}`}
                                          >
                                              {fmt.toUpperCase()}
                                          </button>
                                      ))}
                                  </div>
                              </div>

                              {/* Editor Font Size */}
                              <div>
                                  <label className="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-3">{t.fontSizeLabel}</label>
                                  <div className="flex gap-3">
                                      {[
                                          {id: '13px', label: t.fontSmall, icon: <Type size={14}/>},
                                          {id: '15px', label: t.fontMedium, icon: <Type size={18}/>},
                                          {id: '18px', label: t.fontLarge, icon: <Type size={22}/>}
                                      ].map(size => (
                                          <button
                                              key={size.id}
                                              onClick={() => setEditorFontSize(size.id)}
                                              className={`flex-1 py-2 px-2 rounded-xl font-bold transition-all border-2 flex items-center justify-center gap-1.5 ${editorFontSize === size.id ? 'bg-indigo-50 border-indigo-200 text-indigo-700 dark:bg-indigo-900/30 dark:border-indigo-500/50 dark:text-indigo-300' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50 dark:bg-slate-800 dark:border-slate-700 dark:text-slate-400 dark:hover:bg-slate-700'}`}
                                          >
                                              {size.icon}
                                              <span className="text-sm">{size.label}</span>
                                          </button>
                                      ))}
                                  </div>
                              </div>
                              
                              {/* Parallel Chunks Slider */}
                              <div className="pt-2 border-t border-slate-100 dark:border-slate-800">
                                  <label className="flex justify-between items-center text-sm font-bold text-slate-700 dark:text-slate-300 mb-3 mt-4">
                                      <span>{t.chunks}</span>
                                      <span className="bg-indigo-100 text-indigo-700 dark:bg-indigo-900/50 dark:text-indigo-300 px-2 py-0.5 rounded font-mono">{numChunks}</span>
                                  </label>
                                  <input 
                                      type="range" 
                                      min="4" 
                                      max="64" 
                                      step="4"
                                      value={numChunks}
                                      onChange={(e) => setNumChunks(parseInt(e.target.value))}
                                      className="w-full accent-indigo-600 h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer dark:bg-slate-700"
                                  />
                                  <p className="text-xs text-slate-500 dark:text-slate-400 mt-3 leading-relaxed">
                                      {t.chunksDesc}
                                  </p>
                              </div>
                          </div>
                          
                          <div className="flex justify-end pt-4 border-t border-slate-100 dark:border-slate-800">
                              <button 
                                  onClick={() => setShowSettingsModal(false)}
                                  className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 px-6 rounded-xl transition-colors w-full sm:w-auto"
                              >
                                  {t.closeSave}
                              </button>
                          </div>
                      </div>
                  </div>
              )}

              {/* API Key Modal */}
              {showApiKeyModal && (
                  <div className="fixed inset-0 z-[150] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm transition-all duration-300 p-4">
                      <div className="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl max-w-md w-full p-6 animate-fade-in border border-slate-200 dark:border-slate-800">
                          <h3 className="text-xl font-bold text-slate-800 dark:text-white mb-2 flex items-center gap-2">
                              <Lock className="text-indigo-500" size={20} />
                              {t.apiTitle}
                          </h3>
                          <p className="text-slate-600 dark:text-slate-400 text-sm mb-6 leading-relaxed">
                              {t.apiDesc}
                          </p>
                          
                          <div className="mb-6">
                              <label className="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2">{t.apiKeyLabel}</label>
                              <input 
                                  type="password" 
                                  value={tempApiKey}
                                  onChange={(e) => setTempApiKey(e.target.value)}
                                  placeholder={t.apiKeyPlaceholder}
                                  className="w-full p-3 border border-slate-300 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 bg-white dark:bg-slate-800 font-mono text-left dark:text-white"
                                  dir="ltr"
                              />
                              <p className="text-xs text-slate-500 dark:text-slate-400 mt-2">
                                  {t.noApiKey} <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener noreferrer" className="text-indigo-600 dark:text-indigo-400 hover:underline">{t.getApiKey}</a>.
                              </p>
                          </div>
                          
                          <div className="flex flex-col-reverse sm:flex-row justify-end gap-3">
                              <div className="flex gap-3 mt-4 sm:mt-0">
                                  {geminiApiKey && (
                                      <button 
                                          onClick={() => { handleRemoveApiKey(); setShowApiKeyModal(false); }}
                                          className="px-4 py-2 text-sm font-bold text-red-600 hover:bg-red-50 dark:hover:bg-red-900/30 rounded-xl transition-colors border border-transparent hover:border-red-200 dark:hover:border-red-800"
                                      >
                                          {t.deleteKey}
                                      </button>
                                  )}
                                  <button 
                                      onClick={() => { setShowApiKeyModal(false); setTempApiKey(''); setPendingAction(null); }}
                                      className="px-4 py-2 text-sm font-bold text-slate-600 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800 rounded-xl transition-colors"
                                  >
                                      {t.cancel}
                                  </button>
                              </div>
                              <button 
                                  onClick={handleSaveApiKey}
                                  disabled={!tempApiKey.trim()}
                                  className="bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-300 dark:disabled:bg-indigo-800/50 text-white font-bold py-2 px-6 rounded-xl transition-colors"
                              >
                                  {t.closeSave}
                              </button>
                          </div>
                      </div>
                  </div>
              )}
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
